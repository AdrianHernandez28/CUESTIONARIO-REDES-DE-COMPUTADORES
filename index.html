<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario de Redes</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c5cfc;
    --accent2: #00e5c0;
    --correct: #00e5c0;
    --wrong: #ff4d6d;
    --text: #e8e8f0;
    --muted: #6a6a88;
    --gold: #ffd166;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    padding: 2.5rem 0 2rem;
  }

  .logo-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.35rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-family: 'Space Mono', monospace;
  }

  #setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    margin: 2rem 0;
    position: relative;
    overflow: hidden;
  }

  #setup-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .setup-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .setup-desc {
    font-size: 0.82rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 1.8rem;
  }

  .setup-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .setup-label {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
    min-width: 140px;
  }

  .num-control {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .num-btn {
    background: none;
    border: none;
    color: var(--accent);
    width: 42px;
    height: 42px;
    cursor: pointer;
    font-size: 1.3rem;
    font-weight: 700;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .num-btn:hover { background: var(--border); }

  #num-display {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
    min-width: 40px;
    text-align: center;
  }

  .max-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .mode-options {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .mode-label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    color: var(--text);
  }

  .mode-label input {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }

  .start-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 1rem;
  }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0.8rem 2rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.03em;
  }

  .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }

  #quiz-area { display: none; }

  .progress-wrapper {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 2rem 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }

  .q-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    padding: 0.2rem 0.7rem;
    border-radius: 100px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
  }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    padding: 0.85rem 1rem;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
  }

  .option-item:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(124,92,252,0.08);
  }

  .option-item.selected {
    border-color: var(--accent);
    background: rgba(124,92,252,0.15);
  }

  .option-item.correct {
    border-color: var(--correct);
    background: rgba(0,229,192,0.1);
  }

  .option-item.wrong {
    border-color: var(--wrong);
    background: rgba(255,77,109,0.1);
  }

  .option-item.missed {
    border-color: var(--gold);
    background: rgba(255,209,102,0.08);
  }

  .option-item.disabled { cursor: default; }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .option-item.selected .checkbox { border-color: var(--accent); background: var(--accent); color: #fff; }
  .option-item.correct .checkbox  { border-color: var(--correct); background: var(--correct); color: #000; }
  .option-item.wrong .checkbox    { border-color: var(--wrong); background: var(--wrong); color: #fff; }
  .option-item.missed .checkbox   { border-color: var(--gold); background: var(--gold); color: #000; }

  .option-text {
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--text);
  }

  .feedback {
    margin-top: 1.2rem;
    padding: 0.9rem 1.1rem;
    border-radius: 10px;
    font-size: 0.82rem;
    font-family: 'Space Mono', monospace;
    line-height: 1.5;
    display: none;
  }

  .feedback.show { display: block; }
  .feedback.ok { background: rgba(0,229,192,0.1); border: 1px solid var(--correct); color: var(--correct); }
  .feedback.fail { background: rgba(255,77,109,0.08); border: 1px solid var(--wrong); color: #ff8fa3; }

  .nav-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .btn-check, .btn-next {
    border: none;
    border-radius: 10px;
    padding: 0.7rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-check {
    background: var(--surface2);
    color: var(--accent2);
    border: 1.5px solid var(--accent2);
  }

  .btn-next {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: #fff;
  }

  .btn-check:hover, .btn-next:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-check:disabled { opacity: 0.35; cursor: default; transform: none; }

  #results-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    text-align: center;
    animation: slideIn 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  #results-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--accent2));
  }

  .score-ring {
    width: 120px;
    height: 120px;
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .score-ring .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

  .score-num {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-big {
    font-size: 2rem;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
  }

  .score-small {
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .result-title {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 0.4rem;
  }

  .result-sub {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 2rem;
  }

  .stats-row {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 1.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
  }

  .stat-chip span { display: block; }
  .stat-chip .sv { font-size: 1.1rem; font-weight: 700; }
  .stat-chip .sl { color: var(--muted); font-size: 0.65rem; margin-top: 0.1rem; }

  .btn-restart {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0.85rem 2.2rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-restart:hover { opacity: 0.88; transform: translateY(-1px); }

  @media (max-width: 600px) {
    .setup-row { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .btn-start { margin-left: 0; width: 100%; }
    .question-card { padding: 1.5rem 1.2rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-chip">📡 Redes de Comunicaciones</div>
    <h1>Cuestionario<br>de Redes</h1>
    <p class="subtitle">Selección aleatoria · Multirrespuesta</p>
  </header>

  <div id="setup-panel">
    <div class="setup-title">Configurar cuestionario</div>
    <div class="setup-desc">Ajusta los parámetros para tu sesión de repaso</div>
    
    <div class="setup-row">
      <span class="setup-label">Nº de preguntas:</span>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <div class="num-control">
          <button class="num-btn" id="btn-minus">−</button>
          <span id="num-display">5</span>
          <button class="num-btn" id="btn-plus">+</button>
        </div>
        <span class="max-label" id="max-label">máx. — disponibles</span>
      </div>
    </div>

    <div class="setup-row">
      <span class="setup-label">Modalidad:</span>
      <div class="mode-options">
        <label class="mode-label">
          <input type="radio" name="mode" value="estudio" checked> Estudio (con corrección inmediata)
        </label>
        <label class="mode-label">
          <input type="radio" name="mode" value="examen"> Examen (resultados al final)
        </label>
      </div>
    </div>

    <div class="start-row">
      <button class="btn-start" id="btn-start">Comenzar →</button>
    </div>
  </div>

  <div id="quiz-area">
    <div class="progress-wrapper">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">0 / 0</span>
    </div>
    <div id="question-container"></div>
    <div class="nav-row">
      <button class="btn-check" id="btn-check">Comprobar</button>
      <button class="btn-next" id="btn-next" style="display:none">Siguiente →</button>
    </div>
  </div>

  <div id="results-panel">
    <div class="score-ring">
      <svg viewBox="0 0 120 120" width="120" height="120">
        <circle class="ring-bg" cx="60" cy="60" r="52"/>
        <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52"/>
      </svg>
      <div class="score-num">
        <span class="score-big" id="score-pct">0%</span>
        <span class="score-small">aciertos</span>
      </div>
    </div>
    <div class="result-title" id="result-title">—</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="stats-row">
      <div class="stat-chip"><span class="sv" id="stat-correct" style="color:var(--correct)">0</span><span class="sl">Correctas</span></div>
      <div class="stat-chip"><span class="sv" id="stat-wrong" style="color:var(--wrong)">0</span><span class="sl">Erróneas</span></div>
      <div class="stat-chip"><span class="sv" id="stat-total" style="color:var(--accent2)">0</span><span class="sl">Total</span></div>
    </div>
    <button class="btn-restart" id="btn-restart">Volver a empezar</button>
  </div>

</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────────
const ALL_QUESTIONS = [
  // === EXAM 1 ===
  { id: "E1-A", group: "A", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "ATM es un protocolo exclusivo de nivel 3.", correct: false },
      { text: "Es posible multiplexar la comunicación a nivel de transporte.", correct: true },
      { text: "El nivel de transporte no controla errores.", correct: false },
      { text: "Los niveles 2 y 3 han de estar siempre presentes en una comunicación.", correct: false },
      { text: "Una MAN no puede ser parte de una WAN.", correct: false }
  ]},
  { id: "E1-B", group: "B", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "La carga de una red no depende de la topología de la misma.", correct: true },
      { text: "La carga de una red depende del número de nodos activos.", correct: false },
      { text: "La carga de una red depende del método de acceso empleado.", correct: false },
      { text: "La carga de una red siempre se mejora con un cambio de tecnología de red.", correct: false },
      { text: "El empleo de los diferentes protocolos de comunicaciones está limitado por el valor de MTU.", correct: false }
  ]},
  { id: "E1-C", group: "C", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "No es posible realizar broadcast en redes en anillo.", correct: false },
      { text: "Para una red ATM los tiempos de espera medios son altos en condiciones de baja carga.", correct: false },
      { text: "No es posible obtener concurrencia en redes tipo Fast Ethernet.", correct: false },
      { text: "Es posible obtener concurrencia en una red de tipo 802.3.", correct: true },
      { text: "Todas las redes disponen de nivel de distribución.", correct: false }
  ]},
  { id: "E1-D", group: "D", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "Las redes troncales que dan servicios de cable utilizan combinaciones de fibra y coaxial.", correct: true },
      { text: "La dimensión de una red que utilice CSMA/CD es independiente del tiempo de propagación.", correct: false },
      { text: "Un dispositivo 'hotswap' significa que soporta altas temperaturas.", correct: false },
      { text: "Un acceso básico RDSI incluye un canal E2.", correct: false },
      { text: "Un router trabaja más rápido que un bridge.", correct: false }
  ]},
  { id: "E1-E", group: "E", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "Los circuitos virtuales utilizan una vía de transmisión dedicada.", correct: false },
      { text: "En la conmutación de paquetes los nodos siempre realizan conversión de velocidad.", correct: false },
      { text: "Se utilizan números de secuencia en el modelo de datagrama.", correct: true },
      { text: "El costo en la conmutación de paquetes siempre será función del tiempo de conexión.", correct: false },
      { text: "Un bridge trabaja más rápido que un router.", correct: false }
  ]},
  { id: "E1-F", group: "F", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "Las redes ATM tienen una limitación de distancia debido al protocolo que utilizan.", correct: false },
      { text: "El término Attachment Unit Interface nunca se asocia a redes tipo Ethernet.", correct: false },
      { text: "El tamaño mínimo de paquete en redes Ethernet se adoptó por convenio.", correct: false },
      { text: "Las redes tipo 802.3 permiten topología en estrella.", correct: true },
      { text: "Si cambio de método de acceso aumentará la velocidad de transmisión.", correct: false }
  ]},
  { id: "E1-G", group: "G", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "Frame Relay no permite enlaces por debajo de 2 Mbps.", correct: false },
      { text: "Frame Relay permite enlaces por encima de 2 Mbps.", correct: true },
      { text: "No se puede encapsular ATM sobre SDH.", correct: false },
      { text: "Una MAN es siempre evolución de una LAN.", correct: false },
      { text: "Si cambio el medio de transmisión deberé cambiar de tarjeta de red y el operativo de red.", correct: false }
  ]},
  { id: "E1-H", group: "H", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "Es posible utilizar TCP/IP sobre líneas seriales.", correct: true },
      { text: "No es posible utilizar TCP/IP en comunicaciones por satélite.", correct: false },
      { text: "Un dispositivo de internetworking que tenga 'N' direcciones físicas debe tener 'N' direcciones lógicas.", correct: false },
      { text: "Las direcciones lógicas de una red dependen de las direcciones físicas.", correct: false },
      { text: "Si cambio el medio de transmisión deberé cambiar de tarjeta de red.", correct: false }
  ]},
  { id: "E1-I", group: "I", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "Los datos transmitidos sobre redes Gigabit Ethernet son más rápidos que los de ATM.", correct: false },
      { text: "Las redes ATM pueden transmitir video con QoS.", correct: true },
      { text: "RDSI utiliza conmutación de paquetes con circuito virtual permanente.", correct: false },
      { text: "RDSI utiliza conmutación de paquetes con circuito virtual conmutado.", correct: false },
      { text: "Un mismo router soporta hasta 3 diferentes protocolos de red.", correct: false }
  ]},
  { id: "E1-J", group: "J", exam: "1", text: "Indica cuáles de las siguientes afirmaciones son correctas:", options: [
      { text: "Una red a 1000Mbps conseguirá siempre mejores prestaciones que otra a 100Mbps.", correct: false },
      { text: "No se tarda lo mismo en transmitir un fichero de 1Kbyte por una línea de 128Kbps que enviar uno de 500 bits por una de 64Kbps.", correct: true },
      { text: "La velocidad en baudios nunca podrá ser 1/3 de la velocidad de transmisión serie.", correct: false },
      { text: "No se puede emplear cable coaxial para transmitir en banda base.", correct: false },
      { text: "A nivel de mejorar la carga siempre es interesante insertar un repetidor en una red.", correct: false }

// ─── STATE ─────────────────────────────────────────────────────────────────────
let selectedCount = 5;
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let quizMode = 'estudio';
const MAX = ALL_QUESTIONS.length;

// ─── SETUP ─────────────────────────────────────────────────────────────────────
document.getElementById('max-label').textContent = `máx. ${MAX} disponibles`;

const numDisplay = document.getElementById('num-display');

function updateNum(n) {
  selectedCount = Math.max(1, Math.min(MAX, n));
  numDisplay.textContent = selectedCount;
}
updateNum(5);

document.getElementById('btn-minus').addEventListener('click', () => updateNum(selectedCount - 1));
document.getElementById('btn-plus').addEventListener('click', () => updateNum(selectedCount + 1));

document.getElementById('btn-start').addEventListener('click', startQuiz);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  quizMode = document.querySelector('input[name="mode"]:checked').value;
  questions = shuffle(ALL_QUESTIONS).slice(0, selectedCount);
  current = 0;
  score = 0;
  
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('results-panel').style.display = 'none';
  
  renderQuestion();
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
  document.getElementById('progress-label').textContent = `${current + 1} / ${total}`;

  const container = document.getElementById('question-container');
  container.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'question-card';

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-badge">Grupo ${q.group} · Examen ${q.exam}</span>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options-list" id="opts"></div>
    <div class="feedback" id="feedback"></div>
  `;
  container.appendChild(card);

  const opts = card.querySelector('#opts');
  q.options.forEach((opt, idx) => {
    const item = document.createElement('div');
    item.className = 'option-item';
    item.dataset.idx = idx;
    item.innerHTML = `
      <div class="checkbox" id="cb-${idx}"></div>
      <span class="option-text">${opt.text}</span>
    `;
    item.addEventListener('click', () => toggleOption(item, idx));
    opts.appendChild(item);
  });

  if (quizMode === 'estudio') {
    document.getElementById('btn-check').style.display = 'inline-flex';
    document.getElementById('btn-check').disabled = false;
    document.getElementById('btn-next').style.display = 'none';
  } else {
    document.getElementById('btn-check').style.display = 'none';
    document.getElementById('btn-next').style.display = 'inline-flex';
    // En modo examen cambiamos el texto del botón si es la última
    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = (current === total - 1) ? 'Finalizar →' : 'Siguiente →';
  }
}

function toggleOption(item, idx) {
  if (answered) return;
  item.classList.toggle('selected');
  const cb = item.querySelector('.checkbox');
  cb.textContent = item.classList.contains('selected') ? '✓' : '';
}

// ─── CHECK (SOLO MODO ESTUDIO) ─────────────────────────────────────────────────
document.getElementById('btn-check').addEventListener('click', checkAnswer);

function checkAnswer() {
  if (answered || quizMode !== 'estudio') return;
  answered = true;

  const q = questions[current];
  const items = document.querySelectorAll('.option-item');
  const feedback = document.getElementById('feedback');

  let allCorrect = true;

  items.forEach((item, idx) => {
    const opt = q.options[idx];
    const selected = item.classList.contains('selected');
    item.classList.add('disabled');

    if (opt.correct && selected) {
      item.classList.remove('selected');
      item.classList.add('correct');
      item.querySelector('.checkbox').textContent = '✓';
    } else if (!opt.correct && selected) {
      item.classList.remove('selected');
      item.classList.add('wrong');
      item.querySelector('.checkbox').textContent = '✗';
      allCorrect = false;
    } else if (opt.correct && !selected) {
      item.classList.add('missed');
      item.querySelector('.checkbox').textContent = '!';
      allCorrect = false;
    }
  });

  if (allCorrect) {
    score++;
    feedback.className = 'feedback show ok';
    feedback.textContent = '✓ ¡Correcto! Has seleccionado exactamente las respuestas correctas.';
  } else {
    feedback.className = 'feedback show fail';
    feedback.textContent = '✗ Incorrecto. En verde las correctas que marcaste, en amarillo las que te faltaron, y en rojo las incorrectas.';
  }

  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-flex';
  document.getElementById('btn-next').textContent = 'Siguiente →';
}

// ─── NEXT / EXAMEN EVALUATION ──────────────────────────────────────────────────
document.getElementById('btn-next').addEventListener('click', () => {
  if (quizMode === 'examen') {
    const q = questions[current];
    const items = document.querySelectorAll('.option-item');
    let allCorrect = true;

    items.forEach((item, idx) => {
      const opt = q.options[idx];
      const selected = item.classList.contains('selected');
      if (opt.correct !== selected) {
        allCorrect = false;
      }
    });

    if (allCorrect) score++;
  }

  current++;
  
  if (current >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

// ─── RESULTS ───────────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('results-panel').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total - score;
  document.getElementById('stat-total').textContent = total;

  const titles = [
    [0,  39,  'Sigue practicando', 'Repasa los conceptos y vuelve a intentarlo.'],
    [40, 59,  'Vas por buen camino', 'Algunos conceptos necesitan más repaso.'],
    [60, 79,  '¡Buen trabajo!', 'Tienes una base sólida, sigue así.'],
    [80, 99,  '¡Excelente!', 'Dominas muy bien los contenidos.'],
    [100, 100, '¡Perfecto!', 'Respuestas perfectas. ¡Sobresaliente!'],
  ];
  const [, , title, sub] = titles.find(([lo, hi]) => pct >= lo && pct <= hi);
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = `${score} de ${total} preguntas correctas · ${sub}`;

  const circumference = 2 * Math.PI * 52;
  const ring = document.getElementById('ring-fill');
  const color = pct >= 80 ? 'var(--correct)' : pct >= 50 ? 'var(--accent)' : 'var(--wrong)';
  ring.style.stroke = color;
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference;
  setTimeout(() => {
    ring.style.strokeDashoffset = circumference - (pct / 100) * circumference;
  }, 100);
}

document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('setup-panel').style.display = 'block';
  updateNum(selectedCount);
});
</script>
